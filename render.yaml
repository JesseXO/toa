# Render Blueprint for the TOA monorepo.
# Creates the API (web service), the front-end (static site), and Postgres.
# Secrets marked `sync: false` must be set in the dashboard after first deploy:
#   API: STRIPE_SECRET_KEY, appOrigin (the deployed FE URL)
#   FE : REACT_APP_API_BASE_URL (the API URL), REACT_APP_STRIPE_PUBLISHABLE_KEY
services:
  - type: web
    name: toa-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install --include=dev && npx tsc
    startCommand: node dist/index.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: appOrigin
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase: { name: toa-postgres, property: host }
      - key: DB_PORT
        fromDatabase: { name: toa-postgres, property: port }
      - key: DB_USER
        fromDatabase: { name: toa-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: toa-postgres, property: password }
      - key: DB_NAME
        fromDatabase: { name: toa-postgres, property: database }

  - type: web
    name: toa-app
    runtime: static
    rootDir: app
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_STRIPE_PUBLISHABLE_KEY
        sync: false

databases:
  - name: toa-postgres
    plan: free
    region: frankfurt
    databaseName: toa
    user: toa
    postgresMajorVersion: "16"
