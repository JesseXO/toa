name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── Frontend ─────────────────────────
  frontend:
    name: Frontend — install + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Production build
        run: npm run build
        env:
          CI: false               # CRA escalates warnings to errors when CI=true; let warnings pass

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: crwn-fe-build-${{ github.sha }}
          path: app/build
          retention-days: 7

  # ───────────────────────── Backend ─────────────────────────
  backend:
    name: Backend — install + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  # ───────────────────────── Evaluation ─────────────────────────
  evaluation:
    name: Evaluation harness — metrics
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/evaluation
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run all evaluations
        run: node run-all.js

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            evaluation/results/results.json
            evaluation/results/RESULTS.md
          retention-days: 90
